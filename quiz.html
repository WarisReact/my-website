<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Final Exam Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        .hidden { display: none; }
        .option-label { cursor: pointer; transition: all 0.2s; }
        .option-label:hover { background-color: #e5e7eb; }
        .eliminated { text-decoration: line-through; color: #9ca3af; pointer-events: none; opacity: 0.5; }
    </style>
</head>
<body class="text-gray-800 antialiased p-6">

<div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg mt-10">
    <h1 class="text-3xl font-bold text-center text-blue-600 mb-6">ทบทวนปลายภาค Digital</h1>

    <div id="setup-screen">
        <h2 class="text-xl font-semibold mb-4">เลือกบทที่ต้องการทดสอบ</h2>
        <div class="mb-4">
            <label class="flex items-center space-x-2 mb-2 font-bold">
                <input type="checkbox" id="selectAll" class="form-checkbox h-5 w-5 text-blue-600" onchange="toggleAllChapters(this)">
                <span>เลือกทุกบท</span>
            </label>
            <hr class="mb-2">
            <div id="chapter-list" class="space-y-2 pl-4">
                </div>
        </div>
        <button onclick="startQuiz()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">เริ่มทำควิซ</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="flex justify-between items-center mb-4">
            <span id="progress-text" class="text-sm font-semibold text-gray-500">ข้อที่ 1 / 10</span>
            <span id="chapter-badge" class="px-3 py-1 bg-blue-100 text-blue-800 text-sm rounded-full font-semibold">บทที่ 7</span>
        </div>
        
        <div class="min-h-[200px]">
            <h3 id="question-text" class="text-xl font-medium mb-4 leading-relaxed">คำถาม?</h3>
            <div id="options-container" class="space-y-3 mb-6">
                </div>
        </div>

        <div class="flex justify-between items-center mt-6">
            <button onclick="useHint()" id="hint-btn" class="text-yellow-600 border border-yellow-500 hover:bg-yellow-50 font-semibold py-2 px-4 rounded-lg transition">💡 ขอคำใบ้ (ตัดชอยส์)</button>
            <button onclick="submitAnswer()" id="submit-btn" class="bg-green-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-green-700 transition">ตรวจคำตอบ</button>
            <button onclick="nextQuestion()" id="next-btn" class="hidden bg-blue-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-blue-700 transition">ข้อถัดไป ➔</button>
        </div>
        
        <div id="feedback" class="mt-4 p-4 rounded-lg hidden font-medium text-center"></div>
    </div>

    <div id="result-screen" class="hidden text-center py-8">
        <h2 class="text-3xl font-bold mb-4 text-gray-800">สรุปผลคะแนน</h2>
        <div class="text-6xl font-black text-blue-600 mb-6"><span id="score-display">0</span> / <span id="total-display">0</span></div>
        <p id="result-message" class="text-lg mb-8 text-gray-600">ทำได้เยี่ยมมาก! ไปพักผ่อนหรือทบทวนอีกรอบดี?</p>
        <button onclick="location.reload()" class="bg-gray-800 text-white font-bold py-3 px-8 rounded-lg hover:bg-gray-900 transition">กลับไปหน้าแรก / เริ่มใหม่</button>
    </div>
</div>

<script>
    // ฐานข้อมูลข้อสอบ (ย่อมาให้บางส่วนเพื่อเป็นตัวอย่าง คุณสามารถเพิ่มให้ครบ 10 ข้อในแต่ละบทได้ตามโครงสร้างนี้)
    const database = [
        // ================= บท 7 ระบบฐานข้อมูล =================
        { chapter: "บท 7 ระบบฐานข้อมูล", question: "1. โครงสร้างของแฟ้มข้อมูลใด มีขนาดเล็กที่สุด", options: ["บิต (Bit)", "ไฟล์ (File)", "เรคอร์ด (Record)", "ฟิลด์ (Field)", "ไบต์ (Byte)"], answer: ["บิต (Bit)"] },
        { chapter: "บท 7 ระบบฐานข้อมูล", question: "2. องค์ประกอบของระบบจัดการฐานข้อมูล (Components of the DBMS) ประกอบด้วยองค์ประกอบใดบ้าง (ตอบหลายข้อ)", options: ["ฮาร์ดแวร์", "ซอฟต์แวร์", "ทัปเพิล", "ผู้ใช้งาน", "ข้อมูล", "โพรซีเยอร์", "รีเลชัน"], answer: ["ฮาร์ดแวร์", "ซอฟต์แวร์", "ผู้ใช้งาน", "ข้อมูล", "โพรซีเยอร์"] },
        { chapter: "บท 7 ระบบฐานข้อมูล", question: "3. สถาปัตยกรรมฐานข้อมูลระดับใดที่จัดการ Table และ Relation", options: ["ระดับภายใน (Internal Level)", "ระดับภายนอก (External Level)", "ระดับแนวคิด (Conceptual Level)"], answer: ["ระดับแนวคิด (Conceptual Level)"] },
        { chapter: "บท 7 ระบบฐานข้อมูล", question: "4. ความสัมพันธ์แบบเอ็นทิตีหนึ่งมีความสัมพันธ์กับเอ็นทิตีหนึ่งมากกว่า 1 รายการ คือความสัมพันธ์แบบใด", options: ["One-to-One", "Many-to-Many", "One-to-Many หรือ Many-to-One"], answer: ["One-to-Many หรือ Many-to-One"] },
        { chapter: "บท 7 ระบบฐานข้อมูล", question: "5. ความสัมพันธ์แบบหลายรายการระหว่างเอ็นทิตีหนึ่ง ทั้งสอง คือความสัมพันธ์แบบใด", options: ["Many-to-Many", "One-to-One", "One-to-Many หรือ Many-to-One"], answer: ["Many-to-Many"] },
        { chapter: "บท 7 ระบบฐานข้อมูล", question: "6. ความสัมพันธ์แบบเอ็นทิตีหนึ่งมีความสัมพันธ์กับเอ็นทิตีหนึ่งเพียง 1 รายการ คือความสัมพันธ์แบบใด", options: ["One-to-Many หรือ Many-to-One", "One-to-One", "Many-to-Many"], answer: ["One-to-One"] },
        { chapter: "บท 7 ระบบฐานข้อมูล", question: "7. คีย์ใด จะมีแค่คีย์เดียวในแต่ละรีเลชัน", options: ["คีย์คู่แข่ง (Candidate Key)", "ซุปเปอร์คีย์ (Superkey)", "คีย์หลัก (Primary Key)", "คีย์นอก (Foreign Key)"], answer: ["คีย์หลัก (Primary Key)"] },
        { chapter: "บท 7 ระบบฐานข้อมูล", question: "8. จากคำสั่ง SELECT from EMPLOYEE where EmplID = '25X15' จะได้แถวที่ SSN มีค่าเท่าใด", options: ["999009999", "111005555", "111223333"], answer: ["111223333"] },

        // ================= บท 8 cyber security =================
        { chapter: "บท 8 cyber security", question: "1. การรักษาความปลอดภัยในข้อใด ที่หมายถึงการรักษาความลับไม่ให้ผู้อื่นสามารถเข้ามาดูข้อมูลที่เก็บไว้ได้", options: ["การระบุตัวบุคคลได้ (Authentication)", "การรักษาความถูกต้องของข้อมูล (Integrity)", "การป้องกันการปฏิเสธความรับผิดชอบ (Non-repudiation)", "การรักษาความลับ (Privacy)"], answer: ["การรักษาความลับ (Privacy)"] },
        { chapter: "บท 8 cyber security", question: "2. การรักษาความปลอดภัยในข้อใด ที่หมายถึงระบุตัวตนในระบบเครือข่ายอินเทอร์เน็ต", options: ["การรักษาความลับ (Privacy)", "การป้องกันการปฏิเสธความรับผิดชอบ (Non-repudiation)", "การรักษาความถูกต้องของข้อมูล (Integrity)", "การระบุตัวบุคคลได้ (Authentication)"], answer: ["การระบุตัวบุคคลได้ (Authentication)"] },
        { chapter: "บท 8 cyber security", question: "3. การรักษาความปลอดภัยในข้อใด ที่หมายถึงความสามารถในการรักษาความถูกต้องของข้อมูลได้", options: ["การรักษาความถูกต้องของข้อมูล (Integrity)", "การป้องกันการปฏิเสธความรับผิดชอบ (Non-repudiation)", "การรักษาความลับ (Privacy)", "การระบุตัวบุคคลได้ (Authentication)"], answer: ["การรักษาความถูกต้องของข้อมูล (Integrity)"] },
        { chapter: "บท 8 cyber security", question: "4. การโจมตีระบบสารสนเทศข้อใด ที่สร้างเว็บปลอมเพื่อหลอกให้ผู้ใช้งานกรอกบัญชีผู้ใช้งานและรหัสผ่าน", options: ["แพ็กเก็ตสนิฟเฟอร์ (Packet Sniffer)", "ฟิชชิง (Phishing)", "ไอพีสปูฟิง (IP Spoofing)", "การโจมตีรหัสผ่าน (Password Attacks)", "ดีไนล์ออฟเซอร์วิส (Denial-of-Service) หรือ DOS"], answer: ["ฟิชชิง (Phishing)"] },
        { chapter: "บท 8 cyber security", question: "5. การโจมตีระบบสารสนเทศข้อใด ที่สามารถดักจับบัญชีผู้ใช้งานและรหัสผ่าน บนเครือข่ายเฉพาะที่ (Lan)", options: ["การโจมตีรหัสผ่าน (Password Attacks)", "ฟิชชิ่ง (Phishing)", "แพ็กเก็ตสนิฟเฟอร์ (Packet Sniffer)", "ดีไนล์ออฟเซอร์วิส (Denial-of-Service) หรือ DOS", "ไอพีสปูฟิง (IP Spoofing)"], answer: ["แพ็กเก็ตสนิฟเฟอร์ (Packet Sniffer)"] },
        { chapter: "บท 8 cyber security", question: "6. การโจมตีระบบสารสนเทศข้อใด ที่เป็นการโจมตีด้วยแพ็กเก็ตจำนวนมาก ทำให้ระบบเครือข่ายใช้งานไม่ได้", options: ["ไอพีสปูฟิง (IP Spoofing)", "การโจมตีรหัสผ่าน (Password Attacks)", "แพ็กเก็ตสนิฟเฟอร์ (Packet Sniffer)", "ดีไนล์ออฟเซอร์วิส (Denial-of-Service) หรือ DOS", "ฟิชชิ่ง (Phishing)"], answer: ["ดีไนล์ออฟเซอร์วิส (Denial-of-Service) หรือ DOS"] },
        { chapter: "บท 8 cyber security", question: "7. หลักการ Asymmetric Key Cryptography จะใช้คีย์ใดในการเข้ารหัสข้อมูล", options: ["Secret Key", "Public Key", "Super Key", "Private Key"], answer: ["Public Key"] },
        { chapter: "บท 8 cyber security", question: "8. หลักการ ลายมือชื่อดิจิตอล (Digital Signature) จะใช้คีย์ใดในการเข้าระบบข้อมูล", options: ["Super Key", "Secret Key", "Private Key", "Public Key"], answer: ["Private Key"] },
        { chapter: "บท 8 cyber security", question: "9. ไฟร์วอลล์ชนิดใดที่ทำงานในระดับของแอพพลิเคชั่น ในการป้องกันผู้บุกรุก", options: ["Personal Computer Firewall", "Proxy Firewall", "Packet Filtering Firewall"], answer: ["Proxy Firewall"] },
        { chapter: "บท 8 cyber security", question: "10. ไวรัสคอมพิวเตอร์แบบใด ที่สามารถกระจายตัวไปตามเครือข่ายอินเทอร์เน็ตตามช่องโหว่ของเครือข่ายคอมพิวเตอร์", options: ["บอท (Bots)", "เวิร์ม (Worms)", "โทรจัน (Trojan Horses)", "ไวรัสโปรแกรม (File Infecting Viruses)"], answer: ["เวิร์ม (Worms)"] },

        // ================= บท 9 system development =================

        { chapter: "บท 9 system development", question: "3. ระบบที่มีปัญญาประดิษฐ์ (Artificial Intelligence: AI) มาช่วยในการคำนวณ คือระบบใด", options: ["ระบบผู้เชี่ยวชาญ (Expert System: ES)", "ระบบสารสนเทศสำนักงาน (Office Information System: OIS)", "ระบบสนับสนุนการตัดสินใจ (Decision Support System: DSS)", "ระบบสารสนเทศเพื่อการจัดการ (Management Information System: MIS)", "ระบบประมวลผลรายการ (Transaction Processing System: TPS)"], answer: ["ระบบผู้เชี่ยวชาญ (Expert System: ES)"] },
        { chapter: "บท 9 system development", question: "4. ระบบที่นิยมนำมาใช้ในการพยากรณ์ หรือคาดการณ์ในอนาคตว่าจะเกิดอะไรขึ้น คือระบบใด", options: ["ระบบสารสนเทศสำนักงาน (Office Information System: OIS)", "ระบบผู้เชี่ยวชาญ (Expert System: ES)", "ระบบประมวลผลรายการ (Transaction Processing System: TPS)", "ระบบสนับสนุนการตัดสินใจ (Decision Support System: DSS)", "ระบบสารสนเทศเพื่อการจัดการ (Management Information System: MIS)"], answer: ["ระบบสนับสนุนการตัดสินใจ (Decision Support System: DSS)"] },
        { chapter: "บท 9 system development", question: "5. ระบบสารสนเทศที่เกี่ยวข้องกับพนักงานที่ทำงานกับข้อมูล คือระบบใด", options: ["ระบบสารสนเทศสำนักงาน (Office Information System: OIS)", "ระบบผู้เชี่ยวชาญ (Expert System: ES)", "ระบบสนับสนุนการตัดสินใจ (Decision Support System: DSS)", "ระบบประมวลผลรายการ (Transaction Processing System: TPS)", "ระบบสารสนเทศเพื่อการจัดการ (Management Information System: MIS)"], answer: ["ระบบสารสนเทศสำนักงาน (Office Information System: OIS)"] },

    let hintUsed = false;

    // เตรียมรายชื่อบทในหน้า Setup
    const chapters = [...new Set(database.map(q => q.chapter))];
    const chapterList = document.getElementById('chapter-list');
    chapters.forEach(ch => {
        chapterList.innerHTML += `
            <label class="flex items-center space-x-2">
                <input type="checkbox" value="${ch}" class="chapter-cb form-checkbox h-4 w-4 text-blue-600">
                <span>${ch}</span>
            </label>
        `;
    });

    function toggleAllChapters(source) {
        document.querySelectorAll('.chapter-cb').forEach(cb => cb.checked = source.checked);
    }

    function startQuiz() {
        const selectedCh = Array.from(document.querySelectorAll('.chapter-cb:checked')).map(cb => cb.value);
        if (selectedCh.length === 0) {
            alert("กรุณาเลือกอย่างน้อย 1 บทครับ!");
            return;
        }

        selectedQuestions = database.filter(q => selectedCh.includes(q.chapter));
        // สลับข้อสอบ (Shuffle)
        selectedQuestions.sort(() => Math.random() - 0.5);
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const q = selectedQuestions[currentQuestionIndex];
        hintUsed = false;
        
        document.getElementById('progress-text').innerText = `ข้อที่ ${currentQuestionIndex + 1} / ${selectedQuestions.length}`;
        document.getElementById('chapter-badge').innerText = q.chapter;
        document.getElementById('question-text').innerText = q.question;
        document.getElementById('hint-btn').disabled = false;
        document.getElementById('hint-btn').classList.remove('opacity-50', 'cursor-not-allowed');

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        // เช็คว่าตอบได้หลายข้อหรือไม่
        const isMultiple = q.answer.length > 1;

        q.options.forEach((opt, index) => {
            const inputType = isMultiple ? "checkbox" : "radio";
            container.innerHTML += `
                <label class="option-label flex items-start space-x-3 p-3 border rounded-lg">
                    <input type="${inputType}" name="answer" value="${opt}" class="mt-1 h-4 w-4 text-blue-600">
                    <span class="text-gray-700 font-medium option-text">${opt}</span>
                </label>
            `;
        });

        document.getElementById('submit-btn').classList.remove('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('feedback').classList.add('hidden');
    }

    function useHint() {
        if(hintUsed) return;
        const q = selectedQuestions[currentQuestionIndex];
        const labels = document.querySelectorAll('.option-label');
        let removed = 0;
        
        // สุ่มตัดตัวเลือกที่ผิดออกครึ่งหนึ่ง (เฉพาะแบบตัวเลือกเดียว)
        if(q.answer.length === 1) {
            const wrongOptions = Array.from(labels).filter(lbl => !q.answer.includes(lbl.querySelector('input').value));
            wrongOptions.sort(() => Math.random() - 0.5); // Shuffle
            
            const toRemove = Math.max(1, Math.floor(wrongOptions.length / 2));
            for(let i=0; i<toRemove; i++){
                wrongOptions[i].classList.add('eliminated');
            }
            hintUsed = true;
            document.getElementById('hint-btn').disabled = true;
            document.getElementById('hint-btn').classList.add('opacity-50', 'cursor-not-allowed');
        } else {
            alert("ข้อนี้เป็นแบบตอบหลายข้อ พยายามนึกให้ออกนะฮะ!");
        }
    }

    function submitAnswer() {
        const q = selectedQuestions[currentQuestionIndex];
        const selected = Array.from(document.querySelectorAll('input[name="answer"]:checked')).map(el => el.value);
        
        if (selected.length === 0) {
            alert("กรุณาเลือกคำตอบก่อนครับ!");
            return;
        }

        const isCorrect = selected.length === q.answer.length && selected.every(val => q.answer.includes(val));
        const feedback = document.getElementById('feedback');
        
        feedback.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
        
        if (isCorrect) {
            score++;
            feedback.classList.add('bg-green-100', 'text-green-800');
            feedback.innerHTML = `✅ ถูกต้องครับ!`;
        } else {
            feedback.classList.add('bg-red-100', 'text-red-800');
            feedback.innerHTML = `❌ ผิดครับ<br>คำตอบที่ถูกต้องคือ: <b>${q.answer.join(', ')}</b>`;
        }

        // Disable inputs
        document.querySelectorAll('input[name="answer"]').forEach(el => el.disabled = true);
        
        document.getElementById('submit-btn').classList.add('hidden');
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < selectedQuestions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('score-display').innerText = score;
        document.getElementById('total-display').innerText = selectedQuestions.length;
        
        const percent = score / selectedQuestions.length;
        let msg = "";
        if (percent === 1) msg = "เพอร์เฟกต์! คุณพร้อมสอบแล้วแน่นอน 🎉";
        else if (percent >= 0.7) msg = "เก่งมากครับ ทบทวนอีกนิดหน่อยก็เป๊ะแล้ว 👍";
        else msg = "ไม่เป็นไรครับ ลองทบทวนจุดที่ผิดแล้วมาทำใหม่นะ สู้ๆ! 💪";
        
        document.getElementById('result-message').innerText = msg;
    }
</script>

</body>
</html>
